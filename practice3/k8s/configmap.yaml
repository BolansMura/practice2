apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: practice3
  labels:
    app.kubernetes.io/part-of: practice3-idempotency
data:
  TASK_STREAM: "tasks:stream"
  CONSUMER_GROUP: "workers"
  RESULT_PREFIX: "result:"
  RESULT_TTL_SECONDS: "3600"
  RETRY_MAX_ATTEMPTS: "3"
  RETRY_BASE_DELAY_SEC: "0.1"
  WORKER_METRICS_PORT: "9090"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
